<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Pro - Muflih Print</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root {
            --primary: #4f46e5;
            --promo: #ef4444;
            --bg: #f8fafc;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        body { 
            background-color: var(--bg); 
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            min-height: 100vh;
        }
        
        .main-card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 20px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            height: 100%;
            position: relative;
        }

        /* Foto Container - Hidden by default */
        .img-container {
            height: 200px;
            background: #f1f5f9;
            display: none; /* Default Sembunyi */
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Class untuk menampilkan foto */
        .show-photos .img-container {
            display: flex;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .promo-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--promo);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            z-index: 5;
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3);
        }

        .multi-indicator {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            backdrop-filter: blur(4px);
        }

        .action-btns {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .product-card:hover .action-btns { opacity: 1; }

        /* PREVIEW STYLES */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .preview-item {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            position: relative;
            cursor: grab;
            background: white;
        }
        .preview-item:active { cursor: grabbing; }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-item.is-main {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }
        .main-label {
            position: absolute;
            top: 0; left: 0; right: 0;
            background: var(--primary);
            color: white;
            font-size: 8px;
            text-align: center;
            font-weight: 800;
            padding: 2px 0;
            z-index: 2;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .hidden { display: none !important; }

        .search-box { position: relative; }
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .search-box input {
            padding-left: 45px;
            border-radius: 12px;
            height: 50px;
        }
        .btn-primary {
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
        }

        /* Toggle Switch Styling */
        .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <h5 class="fw-bold" id="loaderText">Menghubungkan...</h5>
    </div>

    <div class="container-fluid py-4 px-lg-5">
        <header class="mb-5 text-center">
            <h2 class="fw-800 text-primary mb-0">MUFLIH PRINT</h2>
            <p class="text-muted">Kelola Gambar Utama & Galeri Produk</p>
        </header>

        <div class="row g-4">
            <!-- Form Section -->
            <div class="col-xl-4">
                <div class="main-card">
                    <div class="d-flex align-items-center mb-4">
                        <i data-lucide="image-plus" class="text-primary me-2"></i>
                        <h5 class="fw-bold m-0" id="formHeader">Tambah Produk</h5>
                    </div>

                    <form id="productForm">
                        <input type="hidden" id="editId" value="">
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">NAMA PRODUK</label>
                            <input type="text" id="nama" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">KATEGORI</label>
                            <select id="kategori" class="form-select" required>
                                <option value="Basic">Basic</option>
                                <option value="Premium">Premium</option>
                                <option value="Eksklusif">Eksklusif</option>
                            </select>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-bold text-muted">HARGA (RP)</label>
                                <input type="number" id="harga" class="form-control" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold text-muted text-danger">HARGA PROMO (RP)</label>
                                <input type="number" id="harga_promo" class="form-control" placeholder="Opsional">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">DESKRIPSI PRODUK</label>
                            <textarea id="deskripsi" class="form-control" rows="3" placeholder="Masukkan detail produk..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">UPLOAD GAMBAR (PILIH SEKALIGUS)</label>
                            <input type="file" id="imageInput" class="form-control" accept="image/*" multiple>
                            <div id="previewBox" class="mt-3 hidden">
                                <p class="small text-muted mb-2">
                                    <i data-lucide="move" size="12"></i> <b>Seret gambar</b> untuk mengatur urutan.
                                </p>
                                <div id="imagePreviewGrid" class="preview-grid"></div>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" id="btnSave" class="btn btn-primary py-3 fw-bold">SIMPAN PRODUK</button>
                            <button type="button" id="btnCancel" class="btn btn-outline-secondary py-2 hidden" onclick="resetForm()">BATAL</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="col-xl-8">
                <div class="mb-4 d-flex flex-wrap gap-3 justify-content-between align-items-center">
                    <div class="search-box flex-grow-1" style="min-width: 250px;">
                        <i data-lucide="search" size="18"></i>
                        <input type="text" id="searchInput" class="form-control border-0 shadow-sm" placeholder="Cari produk...">
                    </div>
                    
                    <div class="d-flex align-items-center gap-3">
                        <!-- Toggle Foto -->
                        <div class="form-check form-switch bg-white px-3 py-2 rounded-3 shadow-sm border">
                            <input class="form-check-input ms-0 me-2" type="checkbox" id="togglePhoto">
                            <label class="form-check-label small fw-bold text-muted" for="togglePhoto">TAMPILKAN FOTO</label>
                        </div>
                        <span id="counter" class="badge bg-primary px-3 py-2">0 Item</span>
                    </div>
                </div>
                
                <div id="gridContainer" class="row g-3"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zqxeoveanevsvynptckm.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxeGVvdmVhbmV2c3Z5bnB0Y2ttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzUzODEsImV4cCI6MjA4OTg1MTM4MX0.eeIaytpW1wtWPJc2FbhufkDkhONUt9yypTZU4dTVmsM";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const CLOUD_NAME = "dqncj2lg2"; 
        const UPLOAD_PRESET = "katalogdanstok"; 

        let localData = [];
        let showPhotos = false;

        // Inisialisasi SortableJS
        const el = document.getElementById('imagePreviewGrid');
        const sortable = Sortable.create(el, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: () => updatePreviewLabels()
        });

        window.onload = () => { fetchData(); lucide.createIcons(); };

        // Toggle Foto Logic
        document.getElementById('togglePhoto').addEventListener('change', (e) => {
    showPhotos = e.target.checked;
    render(document.getElementById('searchInput').value); // Tambahkan ini agar list me-render ulang
});

        function setLoader(show, text = "Memuat...") {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('loaderText').innerText = text;
        }

        async function fetchData() {
            setLoader(true);
            const { data, error } = await _supabase.from('products').select('*').order('created_at', { ascending: false });
            if (!error) { localData = data || []; render(); }
            setLoader(false);
        }

        function render(q = "") {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            
            // Re-apply the photo visibility class based on current state
            container.classList.toggle('show-photos', showPhotos);

            const filtered = localData.filter(p => p.nama.toLowerCase().includes(q.toLowerCase()));
            document.getElementById('counter').innerText = `${filtered.length} Item`;

filtered.forEach(p => {
    const images = p.image ? p.image.split(',') : [];
    const mainImg = images[0] || '';
    const hasPromo = p.is_promo === true;
    
    // LOGIKA BARU: Cek apakah foto harus dibuat atau tidak
    const imgHtml = showPhotos 
        ? `<img src="${mainImg}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
           ${images.length > 1 ? `<div class="multi-indicator">+${images.length} Gambar</div>` : ''}`
        : `<div class="d-flex align-items-center justify-content-center h-100 w-100 text-muted" style="font-size: 0.7rem;">
            <i data-lucide="image-off" class="me-1" size="12"></i> Foto Off
           </div>`;

    const col = document.createElement('div');
    col.className = 'col-md-4 col-sm-6';
    col.innerHTML = `
        <div class="product-card shadow-sm">
            ${hasPromo ? '<div class="promo-badge">PROMO</div>' : ''}
            <div class="action-btns">
                <button class="btn btn-sm btn-light border" onclick="editProduct('${p.id}')"><i data-lucide="edit-3" size="14"></i></button>
                <button class="btn btn-sm btn-light border text-danger" onclick="deleteProduct('${p.id}')"><i data-lucide="trash" size="14"></i></button>
            </div>
            <div class="img-container">
                ${imgHtml}
            </div>
            <div class="p-3">
                <h6 class="fw-bold mb-1 text-truncate">${p.nama}</h6>
                <div class="mb-1">
                    ${hasPromo ? 
                        `<span class="text-primary fw-bold">Rp${parseInt(p.harga_promo).toLocaleString()}</span>
                         <small class="text-muted text-decoration-line-through ms-1">Rp${parseInt(p.harga).toLocaleString()}</small>` : 
                        `<span class="text-primary fw-bold">Rp${parseInt(p.harga).toLocaleString()}</span>`
                    }
                </div>
                <p class="small text-muted text-truncate mb-0" style="font-size: 0.75rem;">${p.deskripsi || 'Tidak ada deskripsi'}</p>
            </div>
        </div>
    `;
    container.appendChild(col);
});
            lucide.createIcons();
        }

        function updatePreviewLabels() {
            const items = document.querySelectorAll('.preview-item');
            items.forEach((item, idx) => {
                item.classList.toggle('is-main', idx === 0);
                const label = item.querySelector('.main-label');
                if (idx === 0) {
                    if (!label) {
                        const newLabel = document.createElement('div');
                        newLabel.className = 'main-label';
                        newLabel.innerText = 'UTAMA';
                        item.prepend(newLabel);
                    }
                } else if (label) {
                    label.remove();
                }
            });
        }

        document.getElementById('imageInput').onchange = (e) => {
            const files = Array.from(e.target.files);
            const grid = document.getElementById('imagePreviewGrid');
            grid.innerHTML = '';
            
            if (files.length > 0) {
                document.getElementById('previewBox').classList.remove('hidden');
                files.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const div = document.createElement('div');
                        div.className = `preview-item ${index === 0 ? 'is-main' : ''}`;
                        div.dataset.fileName = file.name;
                        div.innerHTML = `${index === 0 ? '<div class="main-label">UTAMA</div>' : ''}<img src="${ev.target.result}">`;
                        grid.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            } else { document.getElementById('previewBox').classList.add('hidden'); }
        };

        async function compressImage(file, maxSizeKb = 300) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        const MAX_RES = 1200;
                        if (width > height) { if (width > MAX_RES) { height *= MAX_RES / width; width = MAX_RES; } }
                        else { if (height > MAX_RES) { width *= MAX_RES / height; height = MAX_RES; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const attempt = (q) => {
                            canvas.toBlob((blob) => {
                                if (blob.size / 1024 <= maxSizeKb || q <= 0.1) resolve(blob);
                                else attempt(q - 0.1);
                            }, 'image/jpeg', q);
                        };
                        attempt(0.9);
                    };
                };
            });
        }

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            setLoader(true, "Memproses...");
            const editId = document.getElementById('editId').value;
            const previewItems = Array.from(document.querySelectorAll('.preview-item'));
            const filesFromInput = Array.from(document.getElementById('imageInput').files);
            
            try {
                let finalUrls = [];
                for (let item of previewItems) {
                    const imgTag = item.querySelector('img');
                    const src = imgTag.getAttribute('src');

                    if (src.startsWith('http')) {
                        finalUrls.push(src);
                    } else {
                        const fileName = item.dataset.fileName;
                        const fileMatch = filesFromInput.find(f => f.name === fileName);
                        if (fileMatch) {
                            const blob = await compressImage(fileMatch);
                            const formData = new FormData();
                            formData.append('file', blob);
                            formData.append('upload_preset', UPLOAD_PRESET);
                            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
                            const d = await res.json();
                            finalUrls.push(d.secure_url);
                        }
                    }
                }

                const payload = {
                    nama: document.getElementById('nama').value,
                    kategori: document.getElementById('kategori').value,
                    harga: Number(document.getElementById('harga').value),
                    harga_promo: Number(document.getElementById('harga_promo').value) || null,
                    is_promo: Number(document.getElementById('harga_promo').value) > 0,
                    deskripsi: document.getElementById('deskripsi').value,
                    image: finalUrls.join(',')
                };

                if (editId) await _supabase.from('products').update(payload).eq('id', editId);
                else await _supabase.from('products').insert([payload]);

                resetForm();
                fetchData();
            } catch (err) {
                alert("Gagal: " + err.message);
                setLoader(false);
            }
        };

        window.editProduct = (id) => {
            const p = localData.find(i => i.id === id);
            if (!p) return;
            resetForm();
            document.getElementById('editId').value = p.id;
            document.getElementById('nama').value = p.nama;
            document.getElementById('kategori').value = p.kategori;
            document.getElementById('harga').value = p.harga;
            document.getElementById('harga_promo').value = p.harga_promo || '';
            document.getElementById('deskripsi').value = p.deskripsi || '';
            
            const grid = document.getElementById('imagePreviewGrid');
            grid.innerHTML = '';
            const images = p.image ? p.image.split(',') : [];
            if (images.length > 0) {
                document.getElementById('previewBox').classList.remove('hidden');
                images.forEach((url, idx) => {
                    const div = document.createElement('div');
                    div.className = `preview-item ${idx === 0 ? 'is-main' : ''}`;
                    div.innerHTML = `${idx === 0 ? '<div class="main-label">UTAMA</div>' : ''}<img src="${url}">`;
                    grid.appendChild(div);
                });
            }

            document.getElementById('formHeader').innerText = "Edit Produk";
            document.getElementById('btnCancel').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.deleteProduct = async (id) => {
            if (confirm("Hapus produk ini?")) {
                await _supabase.from('products').delete().eq('id', id);
                fetchData();
            }
        };

        window.resetForm = () => {
            document.getElementById('productForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('imagePreviewGrid').innerHTML = "";
            document.getElementById('previewBox').classList.add('hidden');
            document.getElementById('btnCancel').classList.add('hidden');
            document.getElementById('formHeader').innerText = "Tambah Produk";
        };

        document.getElementById('searchInput').oninput = (e) => render(e.target.value);
    </script>
</body>
</html>
